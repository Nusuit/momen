name: momen
description: Momen mobile app
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  cached_network_image: ^3.4.1
  camera: ^0.11.2+1
  crypto: ^3.0.6
  firebase_core: ^4.7.0
  firebase_crashlytics: ^5.2.0
  flutter:
    sdk: flutter
  flutter_contacts: ^1.1.9+1
  flutter_local_notifications: ^19.4.0
  flutter_riverpod: ^3.3.1
  fpdart: ^1.1.1
  geolocator: ^13.0.1
  go_router: ^17.2.1
  image_picker: ^1.1.2
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3
  supabase_flutter: ^2.12.4
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/onboarding/ob1_finance.png
    - assets/onboarding/ob2_friends.png
    - assets/onboarding/ob3_dashboard.png
    - assets/onboarding/ob4_luxury.png
    - assets/onboarding/ob5_coffee.png
    - assets/onboarding/ob6_city.png
    - assets/onboarding/ob7_nature.png
    - assets/onboarding/ob8_watch.png
